name: CCPP NUOPC CI

on:
  push:
    branches: [ main, 'feat/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: jcsda/docker-gnu-openmpi-dev:1.9

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Cache dependencies and build
      uses: actions/cache@v3
      with:
        path: |
          build/_deps
          build/lib
          build/bin
        key: ${{ runner.os }}-ccpp-deps-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-ccpp-deps-

    - name: Build and Syntax Check
      shell: bash
      run: |
        if [ -f /opt/spack-environment/activate.sh ]; then
          source /opt/spack-environment/activate.sh
        fi

        if command -v spack &> /dev/null; then
          spack install cdeps || true
          spack load esmf ccpp-framework parallelio netcdf-c netcdf-fortran cdeps || true
        fi

        # Ensure build directory exists
        mkdir -p build
        cd build

        # Set paths from Spack if available
        if command -v spack &> /dev/null; then
          ESMF_PATH=$(spack location -i esmf)
          export CMAKE_PREFIX_PATH=$ESMF_PATH:$CMAKE_PREFIX_PATH
        fi

        # Configure and Build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc) VERBOSE=1

        echo "CI build complete."
